<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kumavath Hari Naik - Portfolio</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and ReactDOM CDNs (Production versions) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel CDN (To compile JSX in the browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    /* Custom scrollbar styling for terminal container */
    .scrollbar-thin::-webkit-scrollbar {
      width: 6px;
    }
    .scrollbar-thin::-webkit-scrollbar-track {
      background: #04070d;
    }
    .scrollbar-thin::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 3px;
    }
  </style>
</head>
<body class="bg-[#0a0f1d] text-slate-100">

  <!-- Main mounting point for React -->
  <div id="root"></div>

  <!-- Your React Portfolio Code from Canvas -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Direct translation of Lucide React Icons for global HTML usage
    const Terminal = () => <i data-lucide="terminal" class="w-4 h-4"></i>;
    const TerminalLarge = () => <i data-lucide="terminal" class="w-7 h-7"></i>;
    const ShieldCheck = () => <i data-lucide="shield-check" class="w-6 h-6"></i>;
    const Cpu = () => <i data-lucide="cpu" class="w-5 h-5"></i>;
    const BookOpen = () => <i data-lucide="book-open" class="w-5 h-5"></i>;
    const Award = () => <i data-lucide="award" class="w-6 h-6"></i>;
    const Mail = () => <i data-lucide="mail" class="w-4 h-4"></i>;
    const Phone = () => <i data-lucide="phone" class="w-4 h-4"></i>;
    const MapPin = () => <i data-lucide="map-pin" class="w-4 h-4"></i>;
    const User = () => <i data-lucide="user" class="w-12 h-12"></i>;
    const UserLarge = () => <i data-lucide="user" class="absolute w-14 h-14 text-cyan-500/30"></i>;
    const ChevronRight = () => <i data-lucide="chevron-right" class="w-4 h-4"></i>;
    const Send = () => <i data-lucide="send" class="w-4 h-4"></i>;
    const CheckCircle2 = () => <i data-lucide="check-circle-2" class="w-4 h-4"></i>;
    const Activity = () => <i data-lucide="activity" class="w-3.5 h-3.5 animate-pulse"></i>;
    const Database = () => <i data-lucide="database" class="w-5 h-5"></i>;
    const Lock = () => <i data-lucide="lock" class="w-6 h-6"></i>;
    const LockLarge = () => <i data-lucide="lock" class="w-8 h-8"></i>;
    const Server = () => <i data-lucide="server" class="w-7 h-7"></i>;
    const Play = () => <i data-lucide="play" class="w-3 h-3 text-green-400"></i>;
    const ShieldAlert = () => <i data-lucide="shield-alert" class="w-6 h-6"></i>;
    const AlertTriangle = () => <i data-lucide="alert-triangle" class="w-4 h-4 text-red-500"></i>;
    const RefreshCw = () => <i data-lucide="refresh-cw" class="w-4 h-4 animate-spin"></i>;

    function App() {
      const [activeTab, setActiveTab] = useState('overview');
      const [terminalInput, setTerminalInput] = useState('');
      const [terminalHistory, setTerminalHistory] = useState([
        { text: 'SYSTEM BOOT: Successful.', type: 'success' },
        { text: 'Welcome to Kumavath Hari Naik\'s Secure Portfolio Terminal.', type: 'info' },
        { text: 'Type "help" to view list of available cyber commands, or click the HUD menus.', type: 'warning' }
      ]);
      
      const [firewallActive, setFirewallActive] = useState(true);
      const [networkLog, setNetworkLog] = useState([
        { id: 1, time: '12:00:00', event: 'Firewall initialized.', type: 'success' },
        { id: 2, time: '12:00:05', event: 'IDS/IPS sensors active.', type: 'info' }
      ]);
      const [attackStatus, setAttackStatus] = useState('idle');
      const [activePacket, setActivePacket] = useState(null);
      
      const [formData, setFormData] = useState({ name: '', email: '', subject: '', message: '' });
      const [formSubmitted, setFormSubmitted] = useState(false);
      const [submitting, setSubmitting] = useState(false);

      const terminalEndRef = useRef(null);

      // Trigger lucide icon rendering whenever components paint
      useEffect(() => {
        lucide.createIcons();
      });

      useEffect(() => {
        terminalEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [terminalHistory]);

      const handleTerminalCommand = (e) => {
        e.preventDefault();
        const command = terminalInput.trim().toLowerCase();
        if (!command) return;

        let response = [];

        switch (command) {
          case 'help':
            response = [
              { text: '👉 AVAILABLE COMMANDS:', type: 'info' },
              { text: '  about          - Display objective & bio details', type: 'text' },
              { text: '  skills         - List specialized technical skills', type: 'text' },
              { text: '  education      - View academic background details', type: 'text' },
              { text: '  certifications - Display professional cybersecurity credentials', type: 'text' },
              { text: '  projects       - View Cisco Networking & hands-on projects', type: 'text' },
              { text: '  contact        - Get phone, email, and personal contact info', type: 'text' },
              { text: '  firewall toggle- Enable/Disable laboratory firewall rule', type: 'text' },
              { text: '  clear          - Flush the terminal console buffer', type: 'text' }
            ];
            break;
          case 'about':
            response = [
              { text: '💼 CANDIDATE: Kumavath Hari Naik', type: 'info' },
              { text: '🎯 TARGET: Entry-Level Cloud Security / Cyber Security Analyst', type: 'success' },
              { text: 'An enthusiastic fresher with strong core networking knowledge and web skills.', type: 'text' },
              { text: 'Eager to apply penetration testing, Wireshark monitoring, and cloud-defense protocols in real-world pipelines.', type: 'text' }
            ];
            break;
          case 'skills':
            response = [
              { text: '🛠 TECHNICAL COMPETENCIES:', type: 'info' },
              { text: '  ⚡ Languages: Python (Basics), Java (Basics), C (Basics), Web Tech (CSS, HTML)', type: 'text' },
              { text: '  🐧 OS: Windows, Basics of Linux (File System, Permissions, Networking)', type: 'text' },
              { text: '  💾 Databases: MySQL, Relational Database management', type: 'text' },
              { text: '  🛡 Security Tools: Burp Suite, Wireshark, Packet Tracer simulation', type: 'text' }
            ];
            break;
          case 'education':
            response = [
              { text: '🎓 ACADEMICS AND TIMELINE:', type: 'info' },
              { text: '  🏫 Madanapalle Institute of Technology & Science (2023 - 2027)', type: 'success' },
              { text: '     B.Tech in Computer Science Engineering | CGPA: 8.16', type: 'text' },
              { text: '  🏫 Priyadarshini Institute Of Technology and Science (2021 - 2024)', type: 'text' },
              { text: '     Diploma in Engineering | Score: 75%', type: 'text' },
              { text: '  🏫 S.S.Y.V.N EM High School (2020 - 2021)', type: 'text' },
              { text: '     Matriculation / Tenth Grade | Score: 98%', type: 'text' }
            ];
            break;
          case 'certifications':
            response = [
              { text: '🎖 CYBER CREDENTIALS:', type: 'success' },
              { text: '  🏆 Ethical Hacker - Cisco Certified', type: 'text' },
              { text: '  🏆 Ethical Hacking Level-1 - Supraja Technologies', type: 'text' },
              { text: '  🏆 CyberSecurity Specialist - Slash Mark Training Program', type: 'text' }
            ];
            break;
          case 'projects':
            response = [
              { text: '📂 PROJECTS & TRAINING PORTFOLIO:', type: 'info' },
              { text: '  🌐 Cisco Networking Academy - 8 Weeks Program', type: 'success' },
              { text: '     - Designed robust subnetting models & routing maps on Cisco Packet Tracer.', type: 'text' },
              { text: '     - Learned detailed OSI/TCP-IP structures, port audits, and switching rules.', type: 'text' },
              { text: '  🛡 Outreach Program Event Organizer', type: 'text' },
              { text: '     - Educated local attendees on phishing prevention and dark web identity risks.', type: 'text' }
            ];
            break;
          case 'contact':
            response = [
              { text: '📞 SECURE INCOMING COMM PORT:', type: 'info' },
              { text: '  📧 Email: harinaik9185@gmail.com', type: 'success' },
              { text: '  📱 Hot-line: +91 8882119185', type: 'success' },
              { text: '  📍 Location: Chilamathur, Andhra Pradesh, India', type: 'text' }
            ];
            break;
          case 'firewall toggle':
            setFirewallActive(!firewallActive);
            response = [{ 
              text: `FIREWALL RULES MODIFIED: State set to [${!firewallActive ? 'ENABLED' : 'DISABLED'}]`, 
              type: !firewallActive ? 'success' : 'danger' 
            }];
            addNetworkLog(`Firewall toggled manually by terminal command to ${!firewallActive ? 'ACTIVE' : 'INACTIVE'}`, !firewallActive ? 'success' : 'warning');
            break;
          case 'clear':
            setTerminalHistory([]);
            setTerminalInput('');
            return;
          default:
            response = [
              { text: `⚠️ Command unrecognized: "${command}".`, type: 'danger' },
              { text: 'Type "help" to see valid cybersecurity console directives.', type: 'info' }
            ];
            break;
        }

        setTerminalHistory(prev => [
          ...prev, 
          { text: `guest@harinaik-cyber-pc:~$ ${terminalInput}`, type: 'user' },
          ...response
        ]);
        setTerminalInput('');
      };

      const addNetworkLog = (event, type = 'info') => {
        const time = new Date().toLocaleTimeString();
        setNetworkLog(prev => [{ id: Date.now(), time, event, type }, ...prev].slice(0, 8));
      };

      const triggerPacketScan = (packetType) => {
        if (attackStatus !== 'idle') return;
        
        setActivePacket({ type: packetType, position: 0 });
        setAttackStatus('scanning');
        addNetworkLog(`Incoming packet initialized: [Protocol: ${packetType.toUpperCase()}]`, 'info');

        let interval = setInterval(() => {
          setActivePacket(prev => {
            if (!prev) {
              clearInterval(interval);
              return null;
            }
            if (prev.position >= 100) {
              clearInterval(interval);
              setTimeout(() => {
                evaluatePacketSecurity(packetType);
              }, 300);
              return null;
            }
            return { ...prev, position: prev.position + 10 };
          });
        }, 120);
      };

      const evaluatePacketSecurity = (packetType) => {
        if (packetType === 'legit') {
          setAttackStatus('idle');
          addNetworkLog('Packet safely processed: Source recognized.', 'success');
        } else {
          if (firewallActive) {
            setAttackStatus('blocked');
            addNetworkLog('CRITICAL: Malicious SQLi Payload intercepted by Firewall Rule #409!', 'danger');
            setTimeout(() => setAttackStatus('idle'), 4000);
          } else {
            setAttackStatus('success');
            addNetworkLog('BREACH DETECTED: Rogue script successfully compromised server port 8080!', 'danger');
            setTimeout(() => setAttackStatus('idle'), 6000);
          }
        }
      };

      const handleContactSubmit = (e) => {
        e.preventDefault();
        if (!formData.name || !formData.email || !formData.message) return;
        setSubmitting(true);
        
        setTimeout(() => {
          setSubmitting(false);
          setFormSubmitted(true);
          addNetworkLog(`Contact form submission processed from: ${formData.email}`, 'success');
          setTerminalHistory(prev => [
            ...prev,
            { text: `📬 NOTIFICATION: Received message from ${formData.name} successfully encoded.`, type: 'success' }
          ]);
        }, 1500);
      };

      return (
        <div className="min-h-screen bg-[#0a0f1d] text-slate-100 font-sans selection:bg-cyan-500 selection:text-black">
          <div className="absolute top-0 left-1/4 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl pointer-events-none" />
          <div className="absolute bottom-10 right-1/4 w-96 h-96 bg-indigo-600/10 rounded-full blur-3xl pointer-events-none" />

          <header className="sticky top-0 z-50 backdrop-blur-md bg-[#0a0f1d]/80 border-b border-cyan-500/20 px-4 py-3">
            <div className="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="relative">
                  <div className="p-2.5 bg-cyan-950 border border-cyan-400/50 rounded-lg text-cyan-400 shadow-[0_0_15px_rgba(34,211,238,0.2)] animate-pulse">
                    <Lock />
                  </div>
                  <span className="absolute -bottom-1 -right-1 w-3 h-3 bg-green-500 border-2 border-[#0a0f1d] rounded-full" />
                </div>
                <div>
                  <div className="flex items-center gap-2">
                    <h1 className="text-xl font-bold tracking-wider text-white">KUMAVATH HARI NAIK</h1>
                    <span className="text-[10px] bg-cyan-950 text-cyan-400 px-2 py-0.5 rounded border border-cyan-400/30 font-mono">
                      SEC-LEVEL: LEVEL_1
                    </span>
                  </div>
                  <p className="text-xs text-cyan-400/80 font-mono tracking-widest flex items-center gap-1.5">
                    <Activity />
                    CLOUD SECURITY ASPIRANT / NETWORKING STUDENT
                  </p>
                </div>
              </div>

              <nav className="flex flex-wrap items-center gap-1.5">
                {[
                  { id: 'overview', label: 'Overview HUD', icon: Terminal },
                  { id: 'skills', label: 'Skill Grid', icon: Cpu },
                  { id: 'education', label: 'Academics', icon: BookOpen },
                  { id: 'sandbox', label: 'Interactive Sandbox', icon: ShieldCheck },
                  { id: 'contact', label: 'Connect Port', icon: Mail }
                ].map(tab => {
                  const IconComp = tab.icon;
                  return (
                    <button
                      key={tab.id}
                      onClick={() => setActiveTab(tab.id)}
                      className={`flex items-center gap-2 px-3.5 py-1.5 rounded-lg text-xs font-mono font-medium transition-all duration-300 border ${
                        activeTab === tab.id
                          ? 'bg-cyan-500/10 border-cyan-400 text-cyan-300 shadow-[0_0_15px_rgba(34,211,238,0.1)]'
                          : 'border-transparent text-slate-400 hover:text-white hover:bg-slate-800/40'
                      }`}
                    >
                      <IconComp />
                      {tab.label}
                    </button>
                  );
                })}
              </nav>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 py-8">
            <section className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
              <div className="bg-[#0e1628]/90 border border-slate-800 rounded-xl p-4 flex items-center gap-4 hover:border-cyan-500/30 transition-all">
                <div className="p-3 bg-blue-500/10 text-blue-400 rounded-lg">
                  <ShieldCheck />
                </div>
                <div>
                  <p className="text-xs text-slate-400 uppercase tracking-widest font-mono">Specialization</p>
                  <p className="text-sm font-semibold text-white">Networks & Cloud Defenses</p>
                </div>
              </div>

              <div className="bg-[#0e1628]/90 border border-slate-800 rounded-xl p-4 flex items-center gap-4 hover:border-cyan-500/30 transition-all">
                <div className="p-3 bg-emerald-500/10 text-emerald-400 rounded-lg">
                  <Award />
                </div>
                <div>
                  <p className="text-xs text-slate-400 uppercase tracking-widest font-mono">Certificates</p>
                  <p className="text-sm font-semibold text-white">Cisco Ethical Hacker</p>
                </div>
              </div>

              <div className="bg-[#0e1628]/90 border border-slate-800 rounded-xl p-4 flex items-center gap-4 hover:border-cyan-500/30 transition-all">
                <div className="p-3 bg-purple-500/10 text-purple-400 rounded-lg">
                  <BookOpen />
                </div>
                <div>
                  <p className="text-xs text-slate-400 uppercase tracking-widest font-mono">Education</p>
                  <p className="text-sm font-semibold text-white">B.Tech CSE (8.16 CGPA)</p>
                </div>
              </div>

              <div className="bg-[#0e1628]/90 border border-slate-800 rounded-xl p-4 flex items-center gap-4 hover:border-cyan-500/30 transition-all">
                <div className="p-3 bg-cyan-500/10 text-cyan-400 rounded-lg">
                  <Activity />
                </div>
                <div>
                  <p className="text-xs text-slate-400 uppercase tracking-widest font-mono">Status</p>
                  <p className="text-sm font-semibold text-white">Open to Entry-Level Roles</p>
                </div>
              </div>
            </section>

            {activeTab === 'overview' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div className="lg:col-span-1 space-y-6">
                  <div className="bg-[#0e1628]/95 border border-slate-800 rounded-xl p-6 relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-32 h-32 bg-cyan-500/5 rounded-full blur-2xl" />
                    
                    <div className="flex flex-col items-center text-center">
                      <div className="relative mb-4">
                        <div className="relative w-28 h-28 rounded-full bg-slate-900 border-2 border-cyan-400/40 overflow-hidden flex items-center justify-center shadow-lg shadow-cyan-500/25">
                          <UserLarge />
                          <img 
                            src="harinaik9185.jpg" 
                            alt="Kumavath Hari Naik" 
                            className="absolute inset-0 w-full h-full object-cover"
                          />
                        </div>
                        <span className="absolute bottom-1 right-2 bg-green-500 text-slate-900 text-[9px] font-bold px-1.5 py-0.5 rounded-full uppercase tracking-wider animate-pulse">
                          ONLINE
                        </span>
                      </div>

                      <h3 className="text-lg font-bold text-white tracking-wide">KUMAVATH HARI NAIK</h3>
                      <p className="text-xs text-cyan-400 font-mono mb-4">MITS, Computer Science & Engineering</p>
                      
                      <div className="w-full h-[1px] bg-slate-800 my-4" />
                      
                      <p className="text-xs text-slate-300 leading-relaxed text-justify mb-4">
                        Enthusiastic and energetic fresh B.Tech scholar specializing in computing protocols, network setups, 
                        and penetration testing. Actively focused on transitioning base cybersecurity paradigms towards complex 
                        AWS/Azure/GCP cloud environments.
                      </p>

                      <div className="w-full space-y-2 text-left">
                        <div className="flex items-center gap-2 text-xs text-slate-400">
                          <Mail />
                          <span>harinaik9185@gmail.com</span>
                        </div>
                        <div className="flex items-center gap-2 text-xs text-slate-400">
                          <Phone />
                          <span>+91 8882119185</span>
                        </div>
                        <div className="flex items-center gap-2 text-xs text-slate-400">
                          <MapPin />
                          <span>AP, India (Willing to relocate)</span>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="bg-[#0e1628]/95 border border-slate-800 rounded-xl p-6">
                    <div className="flex items-center justify-between mb-4">
                      <h4 className="font-mono text-xs font-bold uppercase tracking-wider text-slate-300">
                        Featured Training Program
                      </h4>
                      <span className="text-[10px] bg-emerald-950 text-emerald-400 px-2 py-0.5 rounded border border-emerald-500/20">
                        Completed
                      </span>
                    </div>
                    <div className="space-y-4">
                      <div className="border-l-2 border-cyan-400 pl-4 py-1">
                        <h5 className="text-sm font-semibold text-white">Cisco Networking Academy</h5>
                        <p className="text-xs text-slate-400">Cyber Security Training • 8 Weeks</p>
                      </div>
                      <p className="text-xs text-slate-300 leading-relaxed">
                        Practiced system configuration patterns on <strong>Cisco Packet Tracer</strong>. Configured secure subnets, parsed incoming packets with specialized protocols, and optimized basic routing/switching.
                      </p>
                      <button 
                        onClick={() => setActiveTab('sandbox')}
                        className="w-full py-2 bg-slate-800 hover:bg-slate-700/80 text-cyan-300 text-xs font-mono font-medium rounded-lg transition-all border border-slate-700 hover:border-cyan-500/30"
                      >
                        Launch Lab Simulator →
                      </button>
                    </div>
                  </div>
                </div>

                <div className="lg:col-span-2 space-y-6">
                  <div className="bg-[#060b13] border border-cyan-400/30 rounded-xl shadow-[0_0_30px_rgba(6,11,19,0.8)] overflow-hidden">
                    <div className="bg-[#0e1628] px-4 py-3 flex items-center justify-between border-b border-slate-800">
                      <div className="flex items-center gap-2">
                        <Terminal />
                        <span className="text-xs font-mono font-bold text-slate-300">SECURE SHELL PROTOCOL - SSH@PORTFOLIO</span>
                      </div>
                      <div className="flex gap-1.5">
                        <span className="w-3 h-3 rounded-full bg-red-500/40" />
                        <span className="w-3 h-3 rounded-full bg-yellow-500/40" />
                        <span className="w-3 h-3 rounded-full bg-green-500/40" />
                      </div>
                    </div>

                    <div className="p-4 h-[350px] overflow-y-auto font-mono text-xs space-y-3 scrollbar-thin">
                      {terminalHistory.map((item, idx) => {
                        let style = 'text-slate-300';
                        if (item.type === 'success') style = 'text-green-400 font-bold';
                        if (item.type === 'danger') style = 'text-red-400 font-bold';
                        if (item.type === 'warning') style = 'text-yellow-400';
                        if (item.type === 'info') style = 'text-cyan-400';
                        if (item.type === 'user') style = 'text-white font-semibold mt-4 border-t border-slate-900 pt-2';

                        return (
                          <div key={idx} className={`whitespace-pre-wrap leading-relaxed ${style}`}>
                            {item.text}
                          </div>
                        );
                      })}
                      <div ref={terminalEndRef} />
                    </div>

                    <div className="bg-[#080d1a] px-4 py-2 border-t border-slate-900 flex flex-wrap items-center gap-1.5">
                      <span className="text-[10px] text-slate-500 font-mono uppercase mr-1">Quick Commands:</span>
                      {['about', 'skills', 'certifications', 'projects', 'contact', 'clear'].map(cmd => (
                        <button
                          key={cmd}
                          onClick={() => {
                            setTerminalInput(cmd);
                            setTimeout(() => {
                              setTerminalInput(cmd);
                              handleTerminalCommand({ preventDefault: () => {
                                let response = [];
                                switch (cmd) {
                                  case 'about':
                                    response = [
                                      { text: '💼 CANDIDATE: Kumavath Hari Naik', type: 'info' },
                                      { text: '🎯 TARGET: Entry-Level Cloud Security / Cyber Security Analyst', type: 'success' },
                                      { text: 'An enthusiastic fresher with strong core networking knowledge and web skills.', type: 'text' },
                                      { text: 'Eager to apply penetration testing, Wireshark monitoring, and cloud-defense protocols in real-world pipelines.', type: 'text' }
                                    ];
                                    break;
                                  case 'skills':
                                    response = [
                                      { text: '🛠 TECHNICAL COMPETENCIES:', type: 'info' },
                                      { text: '  ⚡ Languages: Python (Basics), Java (Basics), C (Basics), Web Tech (CSS, HTML)', type: 'text' },
                                      { text: '  🐧 OS: Windows, Basics of Linux (File System, Permissions, Networking)', type: 'text' },
                                      { text: '  💾 Databases: MySQL, Relational Database management', type: 'text' },
                                      { text: '  🛡 Security Tools: Burp Suite, Wireshark, Packet Tracer simulation', type: 'text' }
                                    ];
                                    break;
                                  case 'certifications':
                                    response = [
                                      { text: '🎖 CYBER CREDENTIALS:', type: 'success' },
                                      { text: '  🏆 Ethical Hacker - Cisco Certified', type: 'text' },
                                      { text: '  🏆 Ethical Hacking Level-1 - Supraja Technologies', type: 'text' },
                                      { text: '  🏆 CyberSecurity Specialist - Slash Mark Training Program', type: 'text' }
                                    ];
                                    break;
                                  case 'projects':
                                    response = [

                              className={`absolute -top-1.5 w-3.5 h-3.5 rounded-full shadow-[0_0_10px_currentColor] transition-all duration-100 ${
                                activePacket.type === 'legit' ? 'bg-cyan-400 text-cyan-400' : 'bg-red-500 text-red-500'
                              }`}
                              style={{ left: `${activePacket.position}%` }}
                            />
                          )}
                        </div>
                      </div>
                    </div>

                    <div className="text-[11px] text-center text-slate-400 font-mono border-t border-slate-900 pt-3">
                      💡 *Tip: Turn off the Firewall and send a SQLi Exploit to watch the packet breach standard server protections.*
                    </div>
                  </div>

                  <div className="bg-[#0e1628]/95 border border-slate-800 p-6 rounded-xl flex flex-col justify-between">
                    <div>
                      <div className="flex items-center justify-between border-b border-slate-800 pb-2 mb-4">
                        <h3 className="text-sm font-bold text-white font-mono uppercase tracking-wider">
                          Syslog & Security Audits
                        </h3>
                        <span className="text-[10px] text-slate-500 font-mono">Total Logs: {networkLog.length}</span>
                      </div>

                      <div className="space-y-2 h-[220px] overflow-y-auto font-mono text-[11px] scrollbar-thin">
                        {networkLog.map(log => (
                          <div key={log.id} className="p-2 bg-slate-900/50 rounded border border-slate-800/40">
                            <div className="flex justify-between text-[10px] text-slate-500 mb-1">
                              <span>[{log.time}]</span>
                              <span className={`text-[9px] font-bold ${
                                log.type === 'success' ? 'text-green-400' : log.type === 'danger' ? 'text-red-400' : 'text-cyan-400'
                              }`}>{log.type.toUpperCase()}</span>
                            </div>
                            <p className="text-slate-200">{log.event}</p>
                          </div>
                        ))}
                      </div>
                    </div>

                    <button
                      onClick={() => {
                        setNetworkLog([
                          { id: Date.now(), time: new Date().toLocaleTimeString(), event: 'IDS/IPS metrics flushed manually.', type: 'info' }
                        ]);
                      }}
                      className="w-full mt-4 py-1.5 bg-slate-900 hover:bg-slate-800 text-slate-400 hover:text-slate-200 text-xs font-mono rounded border border-slate-800"
                    >
                      Clear Syslog Stream
                    </button>
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'contact' && (
              <div className="space-y-8">
                <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-slate-800 pb-4">
                  <div>
                    <h2 className="text-2xl font-bold text-white tracking-wide">Connect Port</h2>
                    <p className="text-xs text-slate-400 font-mono uppercase tracking-widest mt-1">
                      Secure terminal messaging channel
                    </p>
                  </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                  <div className="bg-[#0e1628]/95 border border-slate-800 rounded-xl p-6">
                    <h3 className="text-md font-bold text-white mb-4 flex items-center gap-2 font-mono">
                      <Send /> SECURE TRANSMISSION PANEL
                    </h3>

                    {formSubmitted ? (
                      <div className="bg-cyan-950/50 border border-cyan-400/40 rounded-xl p-8 text-center space-y-4">
                        <div className="inline-flex p-3 bg-cyan-500/10 text-cyan-400 rounded-full">
                          <CheckCircle2 />
                        </div>
                        <h4 className="text-lg font-bold text-white">Transmission Encoded & Dispatched!</h4>
                        <p className="text-sm text-slate-300 max-w-sm mx-auto leading-relaxed">
                          Your message has been processed successfully and queued into Kumavath Hari Naik's personal terminal.
                        </p>
                        <button
                          onClick={() => {
                            setFormSubmitted(false);
                            setFormData({ name: '', email: '', subject: '', message: '' });
                          }}
                          className="px-4 py-2 bg-slate-800 hover:bg-slate-700/80 text-cyan-400 text-xs font-mono rounded border border-slate-700"
                        >
                          Send New Message
                        </button>
                      </div>
                    ) : (
                      <form onSubmit={handleContactSubmit} className="space-y-4">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          <div>
                            <label className="block text-xs text-slate-400 font-mono uppercase tracking-wider mb-1.5">
                              Sender Name
                            </label>
                            <input
                              type="text"
                              required
                              value={formData.name}
                              onChange={(e) => setFormData({ ...formData, name: e.target.value })}
                              placeholder="Alice Smith"
                              className="w-full bg-[#0a0f1d] border border-slate-800 focus:border-cyan-500/50 focus:outline-none rounded-lg px-3.5 py-2.5 text-sm text-slate-100 placeholder-slate-600 transition-all font-mono"
                            />
                          </div>
                          <div>
                            <label className="block text-xs text-slate-400 font-mono uppercase tracking-wider mb-1.5">
                              Sender Email
                            </label>
                            <input
                              type="email"
                              required
                              value={formData.email}
                              onChange={(e) => setFormData({ ...formData, email: e.target.value })}
                              placeholder="alice@domain.com"
                              className="w-full bg-[#0a0f1d] border border-slate-800 focus:border-cyan-500/50 focus:outline-none rounded-lg px-3.5 py-2.5 text-sm text-slate-100 placeholder-slate-600 transition-all font-mono"
                            />
                          </div>
                        </div>

                        <div>
                          <label className="block text-xs text-slate-400 font-mono uppercase tracking-wider mb-1.5">
                            Subject Payload
                          </label>
                          <input
                            type="text"
                            required
                            value={formData.subject}
                            onChange={(e) => setFormData({ ...formData, subject: e.target.value })}
                            placeholder="Security Analyst Job Opening"
                            className="w-full bg-[#0a0f1d] border border-slate-800 focus:border-cyan-500/50 focus:outline-none rounded-lg px-3.5 py-2.5 text-sm text-slate-100 placeholder-slate-600 transition-all font-mono"
                          />
                        </div>

                        <div>
                          <label className="block text-xs text-slate-400 font-mono uppercase tracking-wider mb-1.5">
                            Message Content
                          </label>
                          <textarea
                            required
                            rows="4"
                            value={formData.message}
                            onChange={(e) => setFormData({ ...formData, message: e.target.value })}
                            placeholder="Type message details here..."
                            className="w-full bg-[#0a0f1d] border border-slate-800 focus:border-cyan-500/50 focus:outline-none rounded-lg px-3.5 py-2.5 text-sm text-slate-100 placeholder-slate-600 transition-all font-mono resize-none"
                          />
                        </div>

                        <button
                          type="submit"
                          disabled={submitting}
                          className="w-full py-3 bg-cyan-500 hover:bg-cyan-400 disabled:opacity-50 text-slate-950 font-bold font-mono text-xs uppercase rounded-lg tracking-widest transition-all flex items-center justify-center gap-2"
                        >
                          {submitting ? (
                            <>
                              <RefreshCw />
                              Encrypting...
                            </>
                          ) : (
                            <>
                              <Send />
                              Dispatch Payload
                            </>
                          )}
                        </button>
                      </form>
                    )}
                  </div>

                  <div className="space-y-6">
                    <div className="bg-[#0e1628]/95 border border-slate-800 rounded-xl p-6">
                      <h3 className="text-md font-bold text-white mb-4 font-mono uppercase tracking-wider">
                        Direct Port Details
                      </h3>
                      <div className="space-y-4">
                        <div className="flex items-start gap-3">
                          <div className="text-cyan-400 mt-0.5"><Mail /></div>
                          <div>
                            <p className="text-xs text-slate-400 font-mono uppercase">Primary Comm</p>
                            <a href="mailto:harinaik9185@gmail.com" className="text-sm font-semibold text-white hover:text-cyan-400">
                              harinaik9185@gmail.com
                            </a>
                          </div>
                        </div>

                        <div className="flex items-start gap-3">
                          <div className="text-cyan-400 mt-0.5"><Phone /></div>
                          <div>
                            <p className="text-xs text-slate-400 font-mono uppercase">Hotline Number</p>
                            <a href="tel:+918882119185" className="text-sm font-semibold text-white hover:text-cyan-400">
                              +91 8882119185
                            </a>
                          </div>
                        </div>

                        <div className="flex items-start gap-3">
                          <div className="text-cyan-400 mt-0.5"><MapPin /></div>
                          <div>
                            <p className="text-xs text-slate-400 font-mono uppercase">Base HQ</p>
                            <p className="text-sm text-slate-200">
                              Madanapalle, Kadiri Road, Andhra Pradesh, India
                            </p>
                          </div>
                        </div>
                      </div>
                    </div>

                    <div className="bg-[#0e1628]/50 border border-slate-800 rounded-xl p-6 space-y-3">
                      <h4 className="text-xs font-mono font-bold uppercase tracking-wider text-slate-300">
                        Quick Verification Guidelines
                      </h4>
                      <ul className="space-y-2 text-xs text-slate-400 list-disc list-inside">
                        <li>Open to immediate hiring processes.</li>
                        <li>Willing to undergo practical secure coding tests or subnetting assessments.</li>
                        <li>Highly interested in both remote and hybrid placements inside core security operations centers (SOC).</li>
                      </ul>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </main>

          <footer className="border-t border-slate-800 bg-[#060b13] py-6 px-4 text-center mt-12">
            <div className="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
              <p className="text-[11px] text-slate-500 font-mono">
                © 2026 Kumavath Hari Naik. All ports mapped properly.
              </p>
              <div className="flex items-center gap-3">
                <span className="w-2.5 h-2.5 bg-green-500 rounded-full animate-ping" />
                <span className="text-[10px] text-slate-400 font-mono">
                  SYSTEM PORT STATUS: ENCRYPTED HTTPS
                </span>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    // Mount to HTML DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
